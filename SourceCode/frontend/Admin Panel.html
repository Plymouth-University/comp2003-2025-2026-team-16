<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Science+Gothic:wght@100..900&display=swap" rel="stylesheet">
    <title>D.O.V.E.S Database — Main</title>
    <meta name="description" content="Search agents and locations in the D.O.V.E.S database.">

  </head>

  <body>
    <script>
      (function () {
        var user = JSON.parse(localStorage.getItem('doveUser'));
        if (!user || user.role !== 'Admin') {
          window.location.replace('Main page.html');
        }
      })();
    </script>
    <div id="header">
      <img src="images/DOVE LOGO.png" alt="The D.O.V.E.S logo" class="logo">
      <h3 id="headerTitle">D.O.V.E.S Database</h3>
    </div>
      <div id="admin-panel-main">
        <div class="tab-container">
          <button class="tab-button active">Users</button>
          <button class="tab-button">Agents</button>
          <button class="tab-button">Locations</button>
          <button class="tab-button">Departments</button>
          <button class="tab-button">Factions</button>
          <button class="tab-button">Suspects</button>
          <button class="tab-button">Archive</button>
          <button class="tab-button">Glossary</button>
          <button class="tab-button">Delete</button>
        </div>
        <section class="admin-form-section" id="form-user">
          <h2>Create New User</h2>
          <form class="admin-form">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <label for="role">Role:</label>
            <select id="role" name="role">
              <option value="User">User</option>
              <option value="Admin">Admin</option>
            </select>
            <label for="rank">Rank:</label>
            <select id="rank" name="rank">
              <option value="nester">Nester</option>
              <option value="hatchling">Hatchling</option>
              <option value="chick">Chick</option>
              <option value="fledgling">Fledgling</option>
              <option value="wing commander">Wing Commander</option>
              <option value="squab leader">Squab Leader</option>
            </select>
            <button type="submit" class="create">Create User</button>
          </form>
        </section>
        <section class="admin-form-section" id="form-agent" style="display:none;">
          <h2>Create New Agent</h2>
          <form class="admin-form">
            <label for="agent_name">Name:</label>
            <input type="text" id="agent_name" name="name" required>
            <label for="agent_codename">Codename:</label>
            <input type="text" id="agent_codename" name="codename">
            <label for="agent_type">Type:</label>
            <select id="agent_type" name="type">
              <option value="field-agents">Field Agent</option>
              <option value="undercover-agents">Undercover Agent</option>
              <option value="management">Management</option>
              <option value="operatives">Operative</option>
            </select>
            <label for="agent_faction">Faction:</label>
            <input type="text" id="agent_faction" name="faction">
            <label for="agent_role">Role:</label>
            <input type="text" id="agent_role" name="role">
            <label for="agent_counterpart">Counterpart:</label>
            <input type="text" id="agent_counterpart" name="counterpart">
            <label for="agent_species">Species:</label>
            <input type="text" id="agent_species" name="species">
            <label for="agent_overview">Overview:</label>
            <textarea id="agent_overview" name="overview"></textarea>
            <label for="agent_background">Background & Origins:</label>
            <textarea id="agent_background" name="background_origins"></textarea>
            <label for="agent_symbolism">Symbolism & Codename Meaning:</label>
            <textarea id="agent_symbolism" name="symbolism_codename_meaning"></textarea>
            <label for="agent_img">Image URL:</label>
            <input type="text" id="agent_img" name="img">
            <label for="agent_min_rank">Minimum Rank Required:</label>
            <select id="agent_min_rank" name="min_rank_required">
              <option value="nester">Nester</option>
              <option value="hatchling">Hatchling</option>
              <option value="chick">Chick</option>
              <option value="fledgling">Fledgling</option>
              <option value="wing commander">Wing Commander</option>
              <option value="squab leader">Squab Leader</option>
            </select>
            <button type="submit" class="create">Create Agent</button>
          </form>
        </section>
        <section class="admin-form-section" id="form-location" style="display:none;">
          <h2>Create New Location</h2>
          <form class="admin-form">
            <label for="location_name">Name:</label>
            <input type="text" id="location_name" name="name" required>
            <label for="location_description">Description:</label>
            <textarea id="location_description" name="description"></textarea>
            <label for="location_min_rank">Minimum Rank Required:</label>
            <select id="location_min_rank" name="min_rank_required">
              <option value="nester">Nester</option>
              <option value="hatchling">Hatchling</option>
              <option value="chick">Chick</option>
              <option value="fledgling">Fledgling</option>
              <option value="wing commander">Wing Commander</option>
              <option value="squab leader">Squab Leader</option>
            </select>
            <button type="submit" class="create">Create Location</button>
          </form>
        </section>
        <section class="admin-form-section" id="form-departments" style="display:none;">
          <h2>Create New Department</h2>
          <form class="admin-form">
            <label for="department_name">Name:</label>
            <input type="text" id="department_name" name="name" required>
            <label for="department_description">Description:</label>
            <textarea id="department_description" name="description"></textarea>
            <label for="department_min_rank">Minimum Rank Required:</label>
            <select id="department_min_rank" name="min_rank_required">
              <option value="nester">Nester</option>
              <option value="hatchling">Hatchling</option>
              <option value="chick">Chick</option>
              <option value="fledgling">Fledgling</option>
              <option value="wing commander">Wing Commander</option>
              <option value="squab leader">Squab Leader</option>
            </select>
            <button type="submit" class="create">Create Department</button>
          </form>
        </section>
        <section class="admin-form-section" id="form-factions" style="display:none;">
          <h2>Create New Faction</h2>
          <form class="admin-form">
            <label for="faction_name">Name:</label>
            <input type="text" id="faction_name" name="name" required>
            <label for="faction_description">Description:</label>
            <textarea id="faction_description" name="description"></textarea>
            <label for="faction_min_rank">Minimum Rank Required:</label>
            <select id="faction_min_rank" name="min_rank_required">
              <option value="nester">Nester</option>
              <option value="hatchling">Hatchling</option>
              <option value="chick">Chick</option>
              <option value="fledgling">Fledgling</option>
              <option value="wing commander">Wing Commander</option>
              <option value="squab leader">Squab Leader</option>
            </select>
            <button type="submit" class="create">Create Faction</button>
          </form>
        </section>
        <section class="admin-form-section" id="form-suspects" style="display:none;">
          <h2>Create New Suspect</h2>
          <form class="admin-form">
            <label for="suspect_name">Name:</label>
            <input type="text" id="suspect_name" name="name" required>
            <label for="suspect_description">Description:</label>
            <textarea id="suspect_description" name="description"></textarea>
            <label for="suspect_min_rank">Minimum Rank Required:</label>
            <select id="suspect_min_rank" name="min_rank_required">
              <option value="nester">Nester</option>
              <option value="hatchling">Hatchling</option>
              <option value="chick">Chick</option>
              <option value="fledgling">Fledgling</option>
              <option value="wing commander">Wing Commander</option>
              <option value="squab leader">Squab Leader</option>
            </select>
            <button type="submit" class="create">Create Suspect</button>
          </form>
        </section>
        <section class="admin-form-section" id="form-archive" style="display:none;">
          <h2>Create New Archive Entry</h2>
          <form class="admin-form">
            <label for="archive_name">Name:</label>
            <input type="text" id="archive_name" name="name" required>
            <label for="archive_description">Description:</label>
            <textarea id="archive_description" name="description"></textarea>
            <label for="archive_min_rank">Minimum Rank Required:</label>
            <select id="archive_min_rank" name="min_rank_required">
              <option value="nester">Nester</option>
              <option value="hatchling">Hatchling</option>
              <option value="chick">Chick</option>
              <option value="fledgling">Fledgling</option>
              <option value="wing commander">Wing Commander</option>
              <option value="squab leader">Squab Leader</option>
            </select>
            <button type="submit" class="create">Create Archive Entry</button>
          </form>
        </section>
        <section class="admin-form-section" id="form-glossary" style="display:none;">
          <h2>Create New Glossary Entry</h2>
          <form class="admin-form">
            <label for="glossary_name">Name:</label>
            <input type="text" id="glossary_name" name="name" required>
            <label for="glossary_description">Description:</label>
            <textarea id="glossary_description" name="description"></textarea>
            <label for="glossary_min_rank">Minimum Rank Required:</label>
            <select id="glossary_min_rank" name="min_rank_required">
              <option value="nester">Nester</option>
              <option value="hatchling">Hatchling</option>
              <option value="chick">Chick</option>
              <option value="fledgling">Fledgling</option>
              <option value="wing commander">Wing Commander</option>
              <option value="squab leader">Squab Leader</option>
            </select>
            <button type="submit" class="create">Create Glossary Entry</button>
          </form>
        </section>
        <section class="admin-form-section" id="form-delete" style="display:none;">
          <h2>Delete Item</h2>
          <form class="admin-form">
            <label for="delete_table">Table:</label>
            <select id="delete_table" name="table">
              <option value="Users">Users</option>
              <option value="Agents">Agents</option>
              <option value="Locations">Locations</option>
              <option value="Departments">Departments</option>
              <option value="Factions">Factions</option>
              <option value="Suspects">Suspects</option>
              <option value="Archive">Archive</option>
              <option value="Glossary">Glossary</option>
            </select>
            <label for="delete_id">ID:</label>
            <input type="number" id="delete_id" name="item_id" required>
            <button type="submit" class="create">Delete Item</button>
          </form>
        </section>
      </div>
    <script src="js/adminPanel.js"></script>
  </body>
</html>
