<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Science+Gothic:wght@100..900&display=swap" rel="stylesheet">
    <title>Safe Cracker - D.O.V.E.S Agent Training</title>
    <style>
        .safe-game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            gap: 30px;
        }

        .game-title {
            font-size: 48px;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 2px #3b2cde, 0 0 4px #589eef, 0 0 8px #bcd5db;
        }

        .difficulty-selection {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .difficulty-btn {
            padding: 12px 24px;
            background-color: rgba(255, 255, 255, 0.05);
            color: #00E5FF;
            text-shadow: 0 0 2px #7DE3FF, 0 0 3px #7DE3FF;
            border: 1px solid #00E5FF;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 160ms ease;
            font-family: "Science Gothic", sans-serif;
        }

        .difficulty-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 6px #7DE3FF;
        }

        .difficulty-btn.active {
            background-color: rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 12px #7DE3FF;
            transform: scale(1.08);
        }

        .safe-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .safe-visual {
            width: 300px;
            height: 300px;
            border: 3px solid #00E5FF;
            border-radius: 15px;
            background: linear-gradient(135deg, rgba(0, 20, 40, 0.8), rgba(0, 50, 80, 0.6));
            box-shadow: 
                0 0 10px #7DE3FF,
                inset 0 0 20px rgba(0, 229, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .dial-container {
            position: relative;
            width: 200px;
            height: 200px;
            border: 3px solid #00E5FF;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 100, 150, 0.3), rgba(0, 20, 40, 0.7));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 0 8px #7DE3FF,
                inset 0 0 15px rgba(0, 229, 255, 0.1);
        }

        .dial-numbers {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dial-number {
            position: absolute;
            font-size: 18px;
            font-weight: bold;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dial-pointer {
            position: absolute;
            width: 8px;
            height: 60px;
            background-color: #00E5FF;
            border-radius: 4px;
            top: 10px;
            box-shadow: 0 0 6px #7DE3FF;
            z-index: 10;
        }

        .dial-center {
            width: 16px;
            height: 16px;
            background-color: #00E5FF;
            border-radius: 50%;
            z-index: 11;
            box-shadow: 0 0 8px #7DE3FF;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .combination-display {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .number-slot {
            width: 50px;
            height: 50px;
            border: 2px solid #00E5FF;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            background-color: rgba(0, 229, 255, 0.05);
            box-shadow: 0 0 4px #7DE3FF;
            min-width: 50px;
        }

        .number-slot.empty {
            color: rgba(0, 229, 255, 0.3);
        }

        .number-slot.filled {
            color: #00E5FF;
            text-shadow: 0 0 4px #7DE3FF;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.05);
            color: #00E5FF;
            text-shadow: 0 0 2px #7DE3FF;
            border: 1px solid #00E5FF;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 160ms ease;
            font-family: "Science Gothic", sans-serif;
        }

        .control-btn:hover {
            background-color: rgba(0, 229, 255, 0.1);
            box-shadow: 0 0 6px #7DE3FF;
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .game-status {
            text-align: center;
            font-size: 20px;
            min-height: 30px;
            text-shadow: 0 0 2px #3b2cde, 0 0 4px #589eef;
        }

        .game-status.success {
            color: #00FF00;
            text-shadow: 0 0 2px #00FF00, 0 0 4px #00FF00;
            font-size: 28px;
            font-weight: bold;
        }

        .game-status.error {
            color: #FF0040;
            text-shadow: 0 0 2px #FF0040, 0 0 4px #FF0040;
        }

        .game-stats {
            display: flex;
            gap: 40px;
            justify-content: center;
            font-size: 18px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #00E5FF;
            text-shadow: 0 0 4px #7DE3FF;
        }

        .reset-btn {
            padding: 12px 30px;
            background-color: rgba(255, 255, 255, 0.05);
            color: #00E5FF;
            text-shadow: 0 0 2px #7DE3FF;
            border: 2px solid #00E5FF;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 160ms ease;
            font-family: "Science Gothic", sans-serif;
            font-weight: bold;
        }

        .reset-btn:hover {
            background-color: rgba(0, 229, 255, 0.15);
            box-shadow: 0 0 12px #7DE3FF;
            transform: scale(1.05);
        }

        .hint-section {
            text-align: center;
            font-size: 16px;
            color: rgba(0, 229, 255, 0.8);
            margin-top: 20px;
        }

        .hint-text {
            color: #FFD700;
            text-shadow: 0 0 4px #FFD700;
            margin-top: 10px;
            font-style: italic;
        }

        .instructions {
            background-color: rgba(0, 229, 255, 0.05);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            max-width: 600px;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div id="header">
        <img src="DOVE LOGO.png" alt="The D.O.V.E.S logo" class="logo">
        <h1 id="headerTitle">Safe Cracker Training</h1>
    </div>

    <div class="safe-game-container">
        <h2 class="game-title">🔐 Agent Safe Cracking Challenge</h2>

        <div class="instructions">
            <strong>Mission Brief:</strong> As a D.O.V.E.S agent, you must crack the safe to retrieve classified documents. 
            Rotate the dial to match the combination lock. Select your difficulty level and start cracking!
        </div>

        <div class="difficulty-selection">
            <button class="difficulty-btn active" data-difficulty="easy">Easy (3 numbers)</button>
            <button class="difficulty-btn" data-difficulty="medium">Medium (4 numbers)</button>
            <button class="difficulty-btn" data-difficulty="hard">Hard (5 numbers)</button>
        </div>

        <div class="game-stats">
            <div class="stat">
                <span>Attempts Used</span>
                <span class="stat-value" id="attemptCount">0</span>
            </div>
            <div class="stat">
                <span>Time Elapsed</span>
                <span class="stat-value" id="timerDisplay">0s</span>
            </div>
        </div>

        <div class="safe-display">
            <div class="safe-visual">
                <div class="dial-container" id="dialContainer">
                    <div class="dial-numbers" id="dialNumbers"></div>
                    <div class="dial-pointer"></div>
                    <div class="dial-center"></div>
                </div>
            </div>

            <div class="input-section">
                <div class="combination-display" id="combinationDisplay"></div>

                <div class="controls">
                    <button class="control-btn" id="prevBtn">← Previous</button>
                    <button class="control-btn" id="nextBtn">Next →</button>
                    <button class="control-btn" id="clearBtn">Clear All</button>
                    <button class="control-btn" id="submitBtn" disabled>Submit Combination</button>
                </div>

                <div class="game-status" id="gameStatus"></div>

                <div class="hint-section">
                    <button class="control-btn" id="hintBtn">Get Hint</button>
                    <div class="hint-text" id="hintText"></div>
                </div>
            </div>
        </div>

        <button class="reset-btn" id="newGameBtn">New Game</button>
    </div>

    <script>
        class SafeCracker {
            constructor() {
                this.currentDifficulty = 'easy';
                this.targetCombination = [];
                this.userCombination = [];
                this.currentDialIndex = 0;
                this.attempts = 0;
                this.hintUsed = false;
                this.startTime = null;
                this.timerInterval = null;
                this.dialRotation = 0;
                this.gameWon = false;

                this.init();
            }

            init() {
                this.setupEventListeners();
                this.generateNewCombination();
                this.renderCombinationDisplay();
                this.updateDialNumbers();
                this.startTimer();
            }

            setupEventListeners() {
                document.querySelectorAll('.difficulty-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => this.changeDifficulty(e.target.dataset.difficulty));
                });

                document.getElementById('nextBtn').addEventListener('click', () => this.rotateDialClockwise());
                document.getElementById('prevBtn').addEventListener('click', () => this.rotateDialCounterClockwise());
                document.getElementById('clearBtn').addEventListener('click', () => this.clearCombination());
                document.getElementById('submitBtn').addEventListener('click', () => this.submitCombination());
                document.getElementById('hintBtn').addEventListener('click', () => this.giveHint());
                document.getElementById('newGameBtn').addEventListener('click', () => this.newGame());

                // Keyboard support
                document.addEventListener('keydown', (e) => {
                    if (this.gameWon) return;
                    if (e.key === 'ArrowRight') this.rotateDialCounterClockwise();
                    if (e.key === 'ArrowLeft') this.rotateDialClockwise();
                    if (e.key === 'Enter') this.submitCombination();
                    if (e.key === ' ') {
                        e.preventDefault();
                        this.selectNumber();
                    }
                });
            }

            changeDifficulty(difficulty) {
                if (this.gameWon) return;
                this.currentDifficulty = difficulty;
                document.querySelectorAll('.difficulty-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                event.target.classList.add('active');
                this.newGame();
            }

            getDifficultyLength() {
                const lengths = { easy: 3, medium: 4, hard: 5 };
                return lengths[this.currentDifficulty];
            }

            generateNewCombination() {
                const length = this.getDifficultyLength();
                this.targetCombination = [];
                for (let i = 0; i < length; i++) {
                    this.targetCombination.push(Math.floor(Math.random() * 40));
                }
                this.userCombination = [];
                this.currentDialIndex = 0;
                this.hintUsed = 0;
                this.attempts = 0;
                this.updateAttemptDisplay();
            }

            updateDialNumbers() {
                const dialNumbers = document.getElementById('dialNumbers');
                dialNumbers.innerHTML = '';
                
                for (let i = 0; i < 40; i++) {
                    const angle = (i * 9) - 90; // 360/40 = 9 degrees per number
                    const radius = 110;
                    const x = radius * Math.cos(angle * Math.PI / 180);
                    const y = radius * Math.sin(angle * Math.PI / 180);

                    const numberEl = document.createElement('div');
                    numberEl.className = 'dial-number';
                    numberEl.textContent = i;
                    numberEl.style.transform = `translate(${x}px, ${y}px)`;
                    dialNumbers.appendChild(numberEl);
                }
            }

            rotateDialClockwise() {
                if (this.gameWon) return;
                this.dialRotation = (this.dialRotation + 9) % 360;
                this.updateDialDisplay();
            }

            rotateDialCounterClockwise() {
                if (this.gameWon) return;
                this.dialRotation = (this.dialRotation - 9 + 360) % 360;
                this.updateDialDisplay();
            }

            updateDialDisplay() {
                const dialNumbers = document.getElementById('dialNumbers');
                dialNumbers.style.transform = `rotate(${this.dialRotation}deg)`;

                const currentNumber = (40 - (Math.round(this.dialRotation / 9) % 40)) % 40;
                document.getElementById('dialContainer').style.boxShadow = 
                    `0 0 8px #7DE3FF, inset 0 0 15px rgba(0, 229, 255, 0.1), 0 0 20px rgba(0, 229, 255, 0.3)`;
            }

            selectNumber() {
                const currentNumber = (40 - (Math.round(this.dialRotation / 9) % 40)) % 40;
                
                if (this.userCombination.length < this.getDifficultyLength()) {
                    this.userCombination.push(currentNumber);
                    this.renderCombinationDisplay();
                    this.clearGameStatus();
                    
                    // Auto-focus to next position
                    if (this.userCombination.length < this.getDifficultyLength()) {
                        this.currentDialIndex = this.userCombination.length;
                    }
                }
                
                if (this.userCombination.length === this.getDifficultyLength()) {
                    document.getElementById('submitBtn').disabled = false;
                }
            }

            renderCombinationDisplay() {
                const display = document.getElementById('combinationDisplay');
                display.innerHTML = '';
                const length = this.getDifficultyLength();

                for (let i = 0; i < length; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'number-slot';
                    
                    if (i < this.userCombination.length) {
                        slot.textContent = String(this.userCombination[i]).padStart(2, '0');
                        slot.classList.add('filled');
                    } else {
                        slot.textContent = '?';
                        slot.classList.add('empty');
                    }
                    
                    display.appendChild(slot);
                }
            }

            submitCombination() {
                if (this.userCombination.length !== this.getDifficultyLength()) {
                    this.showStatus('Please enter all numbers first!', 'error');
                    return;
                }

                this.attempts++;
                this.updateAttemptDisplay();

                if (this.combinationsMatch()) {
                    this.winGame();
                } else {
                    const correctPositions = this.userCombination.filter((num, idx) => num === this.targetCombination[idx]).length;
                    const correctNumbers = this.userCombination.filter(num => this.targetCombination.includes(num)).length;
                    
                    let feedback = `❌ Not quite! `;
                    if (correctPositions > 0) {
                        feedback += `${correctPositions} correct position${correctPositions !== 1 ? 's' : ''}. `;
                    }
                    if (correctNumbers > correctPositions) {
                        feedback += `${correctNumbers - correctPositions} correct number${correctNumbers - correctPositions !== 1 ? 's' : ''} (wrong position).`;
                    }
                    if (correctPositions === 0 && correctNumbers === 0) {
                        feedback += 'No correct numbers. Keep trying!';
                    }
                    
                    this.showStatus(feedback, 'error');
                    this.userCombination = [];
                    this.renderCombinationDisplay();
                    document.getElementById('submitBtn').disabled = true;
                }
            }

            combinationsMatch() {
                return this.userCombination.every((num, idx) => num === this.targetCombination[idx]);
            }

            clearCombination() {
                this.userCombination = [];
                this.currentDialIndex = 0;
                this.dialRotation = 0;
                this.renderCombinationDisplay();
                this.updateDialDisplay();
                this.clearGameStatus();
                document.getElementById('submitBtn').disabled = true;
            }

            giveHint() {
                if (this.hintUsed > 2) {
                    this.showStatus('No more hints available!', 'error');
                    return;
                }

                this.hintUsed++;
                let hint = '';
                
                if (this.hintUsed === 1) {
                    hint = `🔍 First number: ${String(this.targetCombination[0]).padStart(2, '0')}`;
                } else if (this.hintUsed === 2) {
                    if (this.getDifficultyLength() > 1) {
                        hint = `🔍 First number: ${String(this.targetCombination[0]).padStart(2, '0')} | Second number: ${String(this.targetCombination[1]).padStart(2, '0')}`;
                    } else {
                        hint = `🔍 That's all the numbers!`;
                    }
                } else {
                    if (this.getDifficultyLength() === 3) {
                        hint = `🔍 Complete combination: ${this.targetCombination.map(n => String(n).padStart(2, '0')).join(' - ')}`;
                    } else {
                        hint = `🔍 No more hints!`;
                    }
                }
                
                document.getElementById('hintText').textContent = hint;
                document.getElementById('hintBtn').textContent = `Get Hint (${3 - this.hintUsed} left)`;
            }

            winGame() {
                this.gameWon = true;
                clearInterval(this.timerInterval);
                const timeElapsed = Math.floor((Date.now() - this.startTime) / 1000);
                
                const statusEl = document.getElementById('gameStatus');
                statusEl.classList.add('success');
                statusEl.textContent = `🎉 SAFE CRACKED! Mission Complete! Attempts: ${this.attempts} | Time: ${timeElapsed}s`;
                
                // Disable all controls
                document.getElementById('nextBtn').disabled = true;
                document.getElementById('prevBtn').disabled = true;
                document.getElementById('clearBtn').disabled = true;
                document.getElementById('submitBtn').disabled = true;
            }

            newGame() {
                this.gameWon = false;
                clearInterval(this.timerInterval);
                this.startTime = null;
                this.generateNewCombination();
                this.dialRotation = 0;
                this.clearGameStatus();
                this.renderCombinationDisplay();
                this.updateDialDisplay();
                document.getElementById('nextBtn').disabled = false;
                document.getElementById('prevBtn').disabled = false;
                document.getElementById('clearBtn').disabled = false;
                document.getElementById('hintBtn').disabled = false;
                document.getElementById('hintText').textContent = '';
                this.startTimer();
            }

            startTimer() {
                this.startTime = Date.now();
                this.timerInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
                    document.getElementById('timerDisplay').textContent = elapsed + 's';
                }, 100);
            }

            updateAttemptDisplay() {
                document.getElementById('attemptCount').textContent = this.attempts;
            }

            showStatus(message, type) {
                const statusEl = document.getElementById('gameStatus');
                statusEl.textContent = message;
                statusEl.className = 'game-status ' + type;
            }

            clearGameStatus() {
                const statusEl = document.getElementById('gameStatus');
                statusEl.textContent = '';
                statusEl.className = 'game-status';
            }
        }

        // Start the game when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new SafeCracker();
        });
    </script>
</body>
</html>
